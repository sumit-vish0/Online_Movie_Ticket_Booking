
<!DOCTYPE html>
<html>

<head>
    <title>TicketHub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#0f172a;
            color:white;
        }

        nav{
            background:#020617;
            display: flex;
            justify-content: center;
            align-items: center;
            .container-1{
                width: 500px;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .second-container{
                width: 200px;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            }
        


        .movie-card{
            background:#1e293b;
            border:none;
            color:white;
            transition:0.3s;
        }

        .movie-card:hover{
            transform:translateY(-10px);
        }

        .hero{
            background:linear-gradient(135deg,#2563eb,#7c3aed);
            padding:80px;
            text-align:center;
            margin-bottom:40px;
        }

        .movie-img{
            height:250px;
            object-fit:cover;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-dark">
    <div class="container-1">

        <a href="#" class="navbar-brand">
            🎬 TicketHub
        </a>
        <a href="#" class="navbar-brand">
            Home
        </a>
        <a href="#" class="navbar-brand">
            About
        </a>
        <a href="#" class="navbar-brand">
            Contact
        </a>
    </div>
        <div class="second-container">

            <a href="/login"
               class="btn btn-primary">
                Login
            </a>

            <a href="/register"
               class="btn btn-success">
                Register
            </a>

        </div>

</nav>

<div class="hero">

    <h1>Book Movies Online</h1>

    <p>
        Fast • Secure • Easy
    </p>

</div>

<div class="container">

    <div class="row">

        {% for movie in movies %}

        <div class="col-md-4 mb-4">

            <div class="card movie-card">

                <img src="{{ movie.image }}"
                     class="card-img-top movie-img">

                <div class="card-body">

                    <h4>{{ movie.title }}</h4>

                    <p>
                        Show Time:
                        {{ movie.show_time }}
                    </p>

                    <p>
                        Ticket Price:
                        ₹{{ movie.price }}
                    </p>

                    <a href="/movie/{{ movie.id }}"
                       class="btn btn-primary">
                        Book Now
                    </a>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
