
<!DOCTYPE html>
<html>

<head>

<title>{{ movie.title }}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{
background:#0f172a;
color:white;
}

.card{
background:#1e293b;
color:white;
border:none;
}

.movie-img{
height:450px;
object-fit:cover;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="card">

<img src="{{ movie.image }}"
class="movie-img">

<div class="card-body">

<h1>{{ movie.title }}</h1>

<h4>
Show Time:
{{ movie.show_time }}
</h4>

<h4>
Price:
₹{{ movie.price }}
</h4>

<br>

<a href="/select-seat/{{ movie.id }}"
class="btn btn-success btn-lg">
Select Seats
</a>

</div>

</div>

</div>

</body>
</html>
