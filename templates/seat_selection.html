```html
<!DOCTYPE html>
<html>

<head>

<title>Select Seats</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{
background:#0f172a;
color:white;
}

.screen{
width:70%;
margin:auto;
padding:15px;
background:white;
color:black;
text-align:center;
border-radius:10px;
margin-bottom:40px;
}

.seat-grid{
display:grid;
grid-template-columns:repeat(10,60px);
gap:10px;
justify-content:center;
}

.seat{
width:60px;
height:60px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

.seat:hover{
transform:scale(1.1);
}

.booked{
background:#ef4444;
}

.selected{
background:#3b82f6;
}

</style>

</head>

<body>

<div class="container mt-5">

<h1 class="text-center">
{{ movie.title }}
</h1>

<h4 class="text-center">
Select Your Seats
</h4>

<br>

<div class="screen">
SCREEN
</div>
<br><br>

<div class="text-center">

<h4>
Selected Seats:
<span id="seatCount">0</span>
</h4>

<h4>
Total Amount:
₹<span id="totalAmount">0</span>
</h4>

</div>

<div class="seat-grid">

{% for seat in seats %}

<button class="seat
{% if seat.status == 'booked' %}
booked
{% endif %}
">

{{ seat.seat_number }}

</button>

{% endfor %}

</div>
<h2>Price = {{ movie.price }}</h2>
<br><br>

<div class="text-center">

<form action="/payment/{{ movie.id }}" method="POST">

<input
type="hidden"
name="selected_seats"
id="selectedSeatsInput">

<button
class="btn btn-success btn-lg">
Continue To Payment
</button>

</form>

</div>

</div>

<script>

let selectedSeats = [];


let ticketPrice = Number("{{ movie.price }}");


let seats = document.querySelectorAll(".seat");

seats.forEach(seat => {

    seat.addEventListener("click", () => {

        if(seat.classList.contains("booked"))
        {
            return;
        }

        seat.classList.toggle("selected");

        let seatNo = seat.innerText;

        if(selectedSeats.includes(seatNo))
        {
            selectedSeats =
            selectedSeats.filter(
            s => s !== seatNo);
        }
        else
        {
            selectedSeats.push(seatNo);
        }

        document.getElementById(
        "seatCount").innerText =
        selectedSeats.length;

        document.getElementById(
        "totalAmount").innerText =
        selectedSeats.length * ticketPrice;

        document.getElementById(
        "selectedSeatsInput").value =
        selectedSeats.join(",");
    });

});

</script>

</body>

</html>
```
